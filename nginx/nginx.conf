# nginx/nginx.conf
upstream django {
    server backend:8000;
}

server {
    listen 80;
    server_name www.believeriver.site;

    # Let's Encrypt 認証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPSにリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.believeriver.site;

    # SSL証明書
    ssl_certificate     /etc/letsencrypt/live/www.believeriver.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.believeriver.site/privkey.pem;

    # SSL設定
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # フロントエンド（React）
    location / {
        proxy_pass http://frontend:80;
    }

    # バックエンドAPI
    location /api/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Django admin
    location /admin/ {
        proxy_pass         http://django;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # 静的ファイル
    location /static/ {
        alias /app/staticfiles/;
    }

    # メディアファイル
    location /media/ {
        alias /app/media/;
    }
}